name: Test install script

on:
  pull_request:
    paths:
      - 'script/install.sh'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:
  schedule:
    # Weekly Monday 12:00 UTC
    - cron: '0 12 * * 1'

jobs:
  install:
    name: ${{ matrix.image }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:12
            prereq: 'apt-get update && apt-get install -y curl ca-certificates gnupg'
          - image: ubuntu:24.04
            prereq: 'apt-get update && apt-get install -y curl ca-certificates gnupg'
          - image: fedora:41
            prereq: 'dnf install -y curl ca-certificates gnupg2'
          - image: rockylinux:9
            prereq: 'dnf install -y --allowerasing curl ca-certificates gnupg2'
          - image: archlinux:base-devel
            prereq: 'pacman -Sy --noconfirm curl ca-certificates gnupg'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if signed tarball not yet on latest release
        id: precheck
        run: |
          # The first release that ships .tar.gz.asc is the one cut after this
          # PR lands on main. Until then, skip with a clear message rather than
          # fail every PR.
          probe="https://github.com/elleryfamilia/zerminal/releases/latest/download/zerminal-linux-x86_64.tar.gz.asc"
          status=$(curl -sIL -o /dev/null -w "%{http_code}" "$probe")
          if [ "$status" != "200" ]; then
            echo "Latest release lacks a signed tarball yet (probe HTTP $status)."
            echo "Skipping until the next release ships through the new pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run install.sh inside ${{ matrix.image }}
        if: steps.precheck.outputs.skip != 'true'
        env:
          IMAGE: ${{ matrix.image }}
          PREREQ: ${{ matrix.prereq }}
        run: |
          # Use a non-root user since the new installer writes into $HOME and
          # never needs sudo. Some images (debian/ubuntu/fedora) lack a default
          # unprivileged user, so we create one.
          docker run --rm \
            -v "$PWD/script/install.sh:/install.sh:ro" \
            -e ZERMINAL_NONINTERACTIVE=1 \
            "$IMAGE" \
            bash -euc "
              $PREREQ
              id -u tester >/dev/null 2>&1 || useradd -m tester
              cp /install.sh /home/tester/install.sh
              chown tester:tester /home/tester/install.sh
              su - tester -c 'ZERMINAL_NONINTERACTIVE=1 bash /home/tester/install.sh'
              ls -la /home/tester/.local/bin/zerminal
              /home/tester/.local/zerminal.app/bin/zerminal --version || true
            "
