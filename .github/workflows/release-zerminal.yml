name: Release Zerminal

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build but do not create release)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RELEASE_CHANNEL: stable

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Assert ZED_UPDATE_EXPLANATION is unset
        run: |
          if [ -n "${ZED_UPDATE_EXPLANATION+x}" ]; then
            echo "ZED_UPDATE_EXPLANATION must be UNSET for public builds"
            echo "Sentinel-based runtime suppression depends on this."
            exit 1
          fi

      - name: Install Linux dependencies
        run: ./script/linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang-18 and llvm
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18
          echo "CC=clang-18" >> "$GITHUB_ENV"
          echo "CXX=clang++-18" >> "$GITHUB_ENV"
          sudo ln -sf /usr/bin/llvm-objcopy-18 /usr/bin/llvm-objcopy

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Set release channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Set environment
        run: |
          echo "ZED_BUNDLE=true" >> "$GITHUB_ENV"
          version=$(script/get-crate-version zerminal)
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Generate licenses
        run: script/generate-licenses

      - name: Bundle
        run: script/bundle-linux

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v6
        with:
          name: zerminal-linux-x86_64
          path: target/release/zerminal-linux-x86_64.tar.gz
          retention-days: 5

      - name: Upload install.sh artifact
        uses: actions/upload-artifact@v6
        with:
          name: zerminal-install-script
          path: script/install.sh
          retention-days: 5

  build-mac:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      matrix:
        include:
          - arch: aarch64-apple-darwin
            runner: macos-15
            suffix: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Assert ZED_UPDATE_EXPLANATION is unset
        run: |
          if [ -n "${ZED_UPDATE_EXPLANATION+x}" ]; then
            echo "ZED_UPDATE_EXPLANATION must be UNSET for public builds"
            echo "Sentinel-based runtime suppression depends on this."
            exit 1
          fi

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app
          xcodebuild -version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mac-${{ matrix.suffix }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            mac-${{ matrix.suffix }}-cargo-

      - name: Set release channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Set environment
        run: |
          echo "ZED_BUNDLE=true" >> "$GITHUB_ENV"
          version=$(script/get-crate-version zerminal)
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Set up code signing
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          HAS_SIGNING_CERT: ${{ secrets.MACOS_CERTIFICATE != '' }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          echo "MACOS_SIGNING_IDENTITY=${MACOS_SIGNING_IDENTITY}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${APPLE_TEAM_ID}" >> "$GITHUB_ENV"
          {
            echo "MACOS_CERTIFICATE<<CERT_EOF"
            echo "${MACOS_CERTIFICATE}"
            echo "CERT_EOF"
          } >> "$GITHUB_ENV"
          echo "MACOS_CERTIFICATE_PASSWORD=${MACOS_CERTIFICATE_PASSWORD}" >> "$GITHUB_ENV"
          {
            echo "APPLE_NOTARIZATION_KEY<<KEY_EOF"
            echo "${APPLE_NOTARIZATION_KEY}"
            echo "KEY_EOF"
          } >> "$GITHUB_ENV"
          echo "APPLE_NOTARIZATION_KEY_ID=${APPLE_NOTARIZATION_KEY_ID}" >> "$GITHUB_ENV"
          echo "APPLE_NOTARIZATION_ISSUER_ID=${APPLE_NOTARIZATION_ISSUER_ID}" >> "$GITHUB_ENV"

      - name: Bundle
        run: script/bundle-mac ${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: Zerminal-${{ matrix.suffix }}
          path: target/${{ matrix.arch }}/release/Zerminal-${{ matrix.suffix }}.dmg
          retention-days: 5

  sign-linux-tarball:
    name: Sign Linux tarball
    runs-on: ubuntu-22.04
    needs: build-linux-x86_64
    steps:
      - name: Download tar.gz
        uses: actions/download-artifact@v7
        with:
          name: zerminal-linux-x86_64

      - name: Import GPG signing key
        if: env.HAS_GPG_KEY == 'true'
        env:
          HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          # Pre-load the passphrase into the agent so the non-interactive
          # detached-sign below doesn't prompt.
          if [ -n "$GPG_PASSPHRASE" ]; then
            echo "GPG_PASSPHRASE_ARGS=--batch --pinentry-mode loopback --passphrase ${GPG_PASSPHRASE}" >> "$GITHUB_ENV"
          else
            echo "GPG_PASSPHRASE_ARGS=--batch" >> "$GITHUB_ENV"
          fi

      - name: Sign tarball (detached, armored)
        if: env.HAS_GPG_KEY == 'true'
        env:
          HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          # shellcheck disable=SC2086
          gpg ${GPG_PASSPHRASE_ARGS} --local-user ellery@familia.me \
              --detach-sign --armor --output zerminal-linux-x86_64.tar.gz.asc \
              zerminal-linux-x86_64.tar.gz
          gpg --verify zerminal-linux-x86_64.tar.gz.asc zerminal-linux-x86_64.tar.gz

      - name: Export GPG public key
        if: env.HAS_GPG_KEY == 'true'
        env:
          HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          # Export ONLY the canonical signing key by fingerprint. The key store
          # in CI may contain prior keys under the same email; we don't want
          # those leaking into the released keyring.
          gpg --export --armor 8C044786138607EEBFB4E04B3762B68102EC4A8A > zerminal-signing-key.asc

      - name: Upload tarball signature
        if: ${{ hashFiles('zerminal-linux-x86_64.tar.gz.asc') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: zerminal-linux-x86_64-sig
          path: zerminal-linux-x86_64.tar.gz.asc
          retention-days: 5

      - name: Upload GPG public key
        if: ${{ hashFiles('zerminal-signing-key.asc') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: zerminal-gpg-key
          path: zerminal-signing-key.asc
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-linux-x86_64, build-mac, sign-linux-tarball]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    outputs:
      dmg_sha256: ${{ steps.dmg_sha.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Set version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version=$(echo "${TAG_NAME}" | sed 's/^v//')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute DMG sha256
        id: dmg_sha
        run: |
          sha=$(sha256sum artifacts/Zerminal-aarch64/Zerminal-aarch64.dmg | cut -d' ' -f1)
          echo "sha256=${sha}" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        run: |
          mkdir -p release
          cp artifacts/zerminal-linux-x86_64/zerminal-linux-x86_64.tar.gz release/
          cp artifacts/Zerminal-aarch64/Zerminal-aarch64.dmg release/
          cp artifacts/zerminal-install-script/install.sh release/
          chmod +x release/install.sh
          if [ -d artifacts/zerminal-linux-x86_64-sig ]; then
            cp artifacts/zerminal-linux-x86_64-sig/zerminal-linux-x86_64.tar.gz.asc release/
          fi
          if [ -d artifacts/zerminal-gpg-key ]; then
            cp artifacts/zerminal-gpg-key/zerminal-signing-key.asc release/
          fi
          ls -la release/

      - name: Create or upload to release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "Zerminal v${VERSION}" \
              --generate-notes
          fi
          gh release upload "$TAG_NAME" --repo "$REPO" --clobber release/*

  bump-homebrew-tap:
    name: Bump Homebrew tap cask
    runs-on: ubuntu-22.04
    needs: create-release
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Bump cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          DMG_SHA256: ${{ needs.create-release.outputs.dmg_sha256 }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap bump."
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/elleryfamilia/homebrew-zerminal.git" tap
          cd tap
          sed -i -E "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/zerminal.rb
          sed -i -E "s/sha256 \"[^\"]*\"/sha256 \"${DMG_SHA256}\"/" Casks/zerminal.rb
          if git diff --quiet; then
            echo "Cask already at v${VERSION}; nothing to bump."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump zerminal to v${VERSION}"
          git push origin main
